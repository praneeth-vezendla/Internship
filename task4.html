<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To-Do Web App</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1e1e2f;
    color: #eee;
    margin: 0;
    padding: 30px;
    display: flex;
    justify-content: center;
  }
  .container {
    width: 100%;
    max-width: 700px;
    background: #2a2a3d;
    border-radius: 12px;
    padding: 25px 30px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  h1 {
    text-align: center;
    margin-bottom: 5px;
    font-size: 26px;
  }
  .subtitle {
    text-align: center;
    color: #9a9ab0;
    margin-bottom: 25px;
    font-size: 14px;
  }
  .form-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 12px;
  }
  input, select {
    flex: 1;
    min-width: 120px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #1e1e2f;
    color: #eee;
    font-size: 14px;
  }
  input::placeholder { color: #777; }
  button {
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #6a5cff, #47c0e0);
    color: white;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }
  .filters {
    display: flex;
    gap: 8px;
    margin: 15px 0;
    flex-wrap: wrap;
  }
  .filters button {
    background: #3a3a52;
    padding: 6px 14px;
    font-weight: 500;
  }
  .filters button.active {
    background: linear-gradient(135deg, #6a5cff, #47c0e0);
  }
  .list-group {
    margin-bottom: 20px;
  }
  .list-title {
    font-size: 15px;
    color: #9a9ab0;
    margin: 18px 0 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  ul { list-style: none; padding: 0; margin: 0; }
  li {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #33334a;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  li.completed { opacity: 0.55; }
  li.completed .task-title { text-decoration: line-through; }
  .task-info { flex: 1; }
  .task-title { font-weight: 600; font-size: 15px; }
  .task-meta { font-size: 12px; color: #9a9ab0; margin-top: 2px; }
  .task-actions { display: flex; gap: 6px; }
  .task-actions button {
    padding: 6px 10px;
    font-size: 12px;
    border-radius: 6px;
  }
  .btn-edit { background: #e0a847 !important; }
  .btn-delete { background: #e05a5a !important; }
  .btn-complete { background: #4ac47a !important; }
  .empty-msg {
    text-align: center;
    color: #666;
    padding: 20px;
    font-size: 14px;
  }
  input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #6a5cff;
    flex: none;
  }
</style>
</head>
<body>
<div class="container">
  <h1>📝 To-Do Web App</h1>
  <div class="subtitle">Add, organize, edit and complete your tasks</div>

  <div class="form-row">
    <input type="text" id="title" placeholder="Task title">
    <input type="text" id="listName" placeholder="List (e.g. Work, Personal)">
  </div>
  <div class="form-row">
    <input type="text" id="desc" placeholder="Description (optional)">
  </div>
  <div class="form-row">
    <input type="date" id="date">
    <input type="time" id="time">
    <button id="addBtn" onclick="addOrUpdateTask()">Add Task</button>
  </div>

  <div class="filters">
    <button class="active" data-filter="all" onclick="setFilter('all')">All</button>
    <button data-filter="pending" onclick="setFilter('pending')">Pending</button>
    <button data-filter="completed" onclick="setFilter('completed')">Completed</button>
  </div>

  <div id="taskContainer"></div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem('todo_tasks') || '[]');
let editingId = null;
let currentFilter = 'all';

function save() {
  localStorage.setItem('todo_tasks', JSON.stringify(tasks));
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  document.querySelector(`.filters button[data-filter="${f}"]`).classList.add('active');
  render();
}

function addOrUpdateTask() {
  const title = document.getElementById('title').value.trim();
  const listName = document.getElementById('listName').value.trim() || 'General';
  const desc = document.getElementById('desc').value.trim();
  const date = document.getElementById('date').value;
  const time = document.getElementById('time').value;

  if (!title) { alert('Please enter a task title.'); return; }

  if (editingId) {
    const t = tasks.find(x => x.id === editingId);
    t.title = title; t.listName = listName; t.desc = desc; t.date = date; t.time = time;
    editingId = null;
    document.getElementById('addBtn').textContent = 'Add Task';
  } else {
    tasks.push({
      id: Date.now(),
      title, listName, desc, date, time,
      completed: false
    });
  }

  document.getElementById('title').value = '';
  document.getElementById('listName').value = '';
  document.getElementById('desc').value = '';
  document.getElementById('date').value = '';
  document.getElementById('time').value = '';

  save();
  render();
}

function editTask(id) {
  const t = tasks.find(x => x.id === id);
  document.getElementById('title').value = t.title;
  document.getElementById('listName').value = t.listName;
  document.getElementById('desc').value = t.desc;
  document.getElementById('date').value = t.date;
  document.getElementById('time').value = t.time;
  editingId = id;
  document.getElementById('addBtn').textContent = 'Update Task';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function deleteTask(id) {
  tasks = tasks.filter(x => x.id !== id);
  save();
  render();
}

function toggleComplete(id) {
  const t = tasks.find(x => x.id === id);
  t.completed = !t.completed;
  save();
  render();
}

function render() {
  const container = document.getElementById('taskContainer');
  container.innerHTML = '';

  let filtered = tasks;
  if (currentFilter === 'pending') filtered = tasks.filter(t => !t.completed);
  if (currentFilter === 'completed') filtered = tasks.filter(t => t.completed);

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-msg">No tasks here. Add one above!</div>';
    return;
  }

  const groups = {};
  filtered.forEach(t => {
    if (!groups[t.listName]) groups[t.listName] = [];
    groups[t.listName].push(t);
  });

  Object.keys(groups).sort().forEach(listName => {
    const groupDiv = document.createElement('div');
    groupDiv.className = 'list-group';
    groupDiv.innerHTML = `<div class="list-title">${listName}</div>`;
    const ul = document.createElement('ul');

    groups[listName].forEach(t => {
      const li = document.createElement('li');
      if (t.completed) li.classList.add('completed');
      const dueStr = t.date ? `${t.date}${t.time ? ' ' + t.time : ''}` : 'No due date';
      li.innerHTML = `
        <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="toggleComplete(${t.id})">
        <div class="task-info">
          <div class="task-title">${t.title}</div>
          <div class="task-meta">${t.desc ? t.desc + ' • ' : ''}Due: ${dueStr}</div>
        </div>
        <div class="task-actions">
          <button class="btn-edit" onclick="editTask(${t.id})">Edit</button>
          <button class="btn-delete" onclick="deleteTask(${t.id})">Delete</button>
        </div>
      `;
      ul.appendChild(li);
    });

    groupDiv.appendChild(ul);
    container.appendChild(groupDiv);
  });
}

render();
</script>
</body>
</html>
